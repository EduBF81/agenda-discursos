<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico S-99</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/nav.css">
    <link rel="stylesheet" href="./css/buttons.css">
    <style>
        main {
            max-width: 1100px;
            margin: 20px auto;
            background: var(--bg-container);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .subtitulo {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        fieldset {
            border: 1px solid var(--border-light);
            border-radius: 6px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #fafafa;
        }

        legend {
            font-weight: bold;
            color: var(--main-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2.5fr 2fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: bold;
            font-size: 0.9em;
            color: var(--text-main);
        }

        select,
        input {
            width: 100%;
            height: 40px;
            padding: 8px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 15px;
            background-color: #fff;
        }

        button[type="submit"] {
            height: 40px;
            margin: 0;
            width: 100%;
            padding: 0 20px;
            background-color: var(--btn-success);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button[type="submit"]:hover {
            background-color: var(--btn-success-hover);
        }

        .barra-pesquisa {
            margin-bottom: 15px;
        }

        .barra-pesquisa input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid var(--border-table);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--main-color);
            color: var(--branco);
        }

        tr:nth-child(even) {
            background-color: var(--bg-table-even);
        }

        tr:hover {
            background-color: var(--bg-table-hover);
        }

        .estado-vazio {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-style: italic;
        }

        .btn-acao {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: var(--branco);
        }

        .btn-apagar {
            background-color: var(--btn-danger);
        }

        .btn-apagar:hover {
            background-color: var(--btn-danger-hover);
        }

        .ano-recente {
            font-weight: bold;
            color: var(--btn-success);
        }

        @media (max-width: 800px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            button[type="submit"] {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="site-brand">
            <h1>🎙️ Agenda Discurso</h1>
        </div>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="palestrantes.html">Oradores</a></li>
            <li><a href="agendar.html">Agendar</a></li>
            <li><a href="consulta.html">Consultar</a></li>
            <li><a href="historico.html">S-99</a></li>
            <li><a href="#" id="btnSair">Sair</a></li>
        </ul>
    </nav>

    <main id="conteudoPrincipal" style="display: none;">
        <h2>Controle de Temas (S-99)</h2>
        <p class="subtitulo">Acompanhe os oradores e os anos em que os discursos foram realizados na congregação.</p>

        <form id="formHistorico">
            <fieldset>
                <legend>Registrar Discurso Realizado</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="selectTema">Tema do Discurso:</label>
                        <select id="selectTema" name="tema" required>
                            <option value="">A processar lista de temas...</option>
                        </select>
                    </div>
                    <!-- CAMPO ATUALIZADO: Dropdown conectado ao Banco de Dados -->
                    <div class="form-group">
                        <label for="selectOrador">Orador (Irmão):</label>
                        <select id="selectOrador" name="oradorId" required>
                            <option value="">A carregar oradores...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputAno">Ano Realizado:</label>
                        <input type="number" id="inputAno" name="ano" min="2000" max="2100" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" id="btnSalvar">Adicionar</button>
                    </div>
                </div>
            </fieldset>
        </form>

        <section>
            <div class="barra-pesquisa">
                <input type="text" id="inputPesquisa" placeholder="🔍 Pesquisar por número, tema, orador ou ano...">
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px; text-align: center;">Nº</th>
                            <th>Título do Discurso</th>
                            <th>Orador</th>
                            <th style="width: 100px; text-align: center;">Ano</th>
                            <th style="width: 90px; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaDados">
                        <tr>
                            <td colspan="5" class="estado-vazio">A carregar dados do Firebase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

        `;

        const temasFormatados = textoBrutoS99
            .split('\n')
            .filter(linha => linha.trim() !== '')
            .map(linha => {
                const partes = linha.split('.');
                if (partes.length >= 2) {
                    return {
                        numero: parseInt(partes[0].trim()),
                        titulo: partes.slice(1).join('.').trim()
                    };
                }
                return null;
            })
            .filter(item => item !== null);

        // ATUALIZAÇÃO: Agora é async para podermos buscar os oradores na inicialização
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('login.html');
            } else {
                document.getElementById('conteudoPrincipal').style.display = 'block';
                document.getElementById('inputAno').value = new Date().getFullYear();
                preencherSelectTemas();
                await carregarPalestrantes(); // Busca oradores no Firebase
                carregarHistorico();
            }
        });

        document.getElementById('btnSair').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
        });

        function preencherSelectTemas() {
            const select = document.getElementById('selectTema');
            select.innerHTML = '<option value="">-- Escolha o Tema --</option>';

            temasFormatados.forEach(tema => {
                const option = document.createElement('option');
                option.value = `${tema.numero}|${tema.titulo}`;
                option.textContent = `Nº ${tema.numero} - ${tema.titulo}`;
                select.appendChild(option);
            });
        }

        // NOVO: Função para popular o dropdown de oradores a partir da coleção 'palestrantes'
        async function carregarPalestrantes() {
            const selectOrador = document.getElementById('selectOrador');
            try {
                const querySnapshot = await getDocs(collection(db, "palestrantes"));
                palestrantesData = [];
                selectOrador.innerHTML = '<option value="">-- Escolha o Orador --</option>';

                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    palestrantesData.push({ id: doc.id, ...dados });
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = `${dados.nome} (${dados.congregacao})`;
                    selectOrador.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao carregar oradores:", error);
                selectOrador.innerHTML = '<option value="">Erro ao carregar oradores</option>';
            }
        }

        document.getElementById('inputPesquisa').addEventListener('input', filtrarTabela);

        // CREATE: Salva o ID do orador e faz um snapshot do nome
        document.getElementById('formHistorico').addEventListener('submit', async (event) => {
            event.preventDefault();
            const btnSalvar = document.getElementById('btnSalvar');
            btnSalvar.textContent = "A salvar...";
            btnSalvar.disabled = true;

            const form = event.target;
            const [numero, titulo] = form.tema.value.split('|');
            const palestranteId = form.oradorId.value;
            const ano = parseInt(form.ano.value);

            // DESNORMALIZAÇÃO: Pega o nome textual do orador escolhido
            const oradorSelecionado = palestrantesData.find(p => p.id === palestranteId);
            const nomeOradorSnapshot = oradorSelecionado ? oradorSelecionado.nome : "Desconhecido";

            try {
                await addDoc(collection(db, "historico_temas"), {
                    numeroTema: parseInt(numero),
                    tituloTema: titulo,
                    palestranteId: palestranteId,   // Ligação forte (Relacional)
                    orador: nomeOradorSnapshot,     // O 'Snapshot' do nome para segurança futura
                    anoRealizado: ano,
                    dataRegistro: new Date().toISOString()
                });

                form.reset();
                document.getElementById('inputAno').value = new Date().getFullYear();
                carregarHistorico();
            } catch (error) {
                console.error("Erro ao registrar histórico:", error);
                alert("Erro ao salvar dados.");
            } finally {
                btnSalvar.textContent = "Adicionar";
                btnSalvar.disabled = false;
            }
        });

        // READ
        async function carregarHistorico() {
            const tbody = document.getElementById("tabelaDados");
            try {
                const querySnapshot = await getDocs(collection(db, "historico_temas"));
                historicoGlobal = [];

                querySnapshot.forEach((doc) => {
                    historicoGlobal.push({ id: doc.id, ...doc.data() });
                });

                historicoGlobal.sort((a, b) => a.numeroTema - b.numeroTema);
                renderizarTabela(historicoGlobal);
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="estado-vazio" style="color: red;">Erro ao carregar histórico.</td></tr>';
            }
        }

        function renderizarTabela(dados) {
            const tbody = document.getElementById("tabelaDados");
            tbody.innerHTML = "";

            if (dados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="estado-vazio">Nenhum discurso registrado no histórico ainda.</td></tr>';
                return;
            }

            const anoAtual = new Date().getFullYear();

            dados.forEach(registro => {
                const tr = document.createElement("tr");
                const classeAno = registro.anoRealizado >= anoAtual - 1 ? "ano-recente" : "";

                // Usamos registro.orador que é o nosso 'Snapshot' guardado com segurança
                tr.innerHTML = `
                    <td style="text-align: center;"><strong>${registro.numeroTema}</strong></td>
                    <td>${escaparHTML(registro.tituloTema)}</td>
                    <td>${escaparHTML(registro.orador || '-')}</td>
                    <td style="text-align: center;" class="${classeAno}">${registro.anoRealizado}</td>
                    <td style="text-align: center;">
                        <button class="btn-acao btn-apagar" data-id="${registro.id}" title="Apagar Registro">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // DELETE
        document.getElementById('tabelaDados').addEventListener('click', async (event) => {
            const btn = event.target.closest('.btn-apagar');
            if (!btn) return;

            const idDocumento = btn.getAttribute('data-id');
            if (confirm("Deseja realmente apagar este registro do histórico?")) {
                try {
                    await deleteDoc(doc(db, "historico_temas", idDocumento));
                    carregarHistorico();
                } catch (error) {
                    alert("Erro ao apagar o registro.");
                }
            }
        });

        // FILTRO
        function filtrarTabela(event) {
            const termoBusca = event.target.value.toLowerCase().trim();
            if (!termoBusca) return renderizarTabela(historicoGlobal);

            const dadosFiltrados = historicoGlobal.filter(r =>
                r.tituloTema.toLowerCase().includes(termoBusca) ||
                r.numeroTema.toString().includes(termoBusca) ||
                r.anoRealizado.toString().includes(termoBusca) ||
                (r.orador && r.orador.toLowerCase().includes(termoBusca))
            );
            renderizarTabela(dadosFiltrados);
        }

        function escaparHTML(texto) {
            if (!texto) return "";
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }
    </script>
</body>

</html>
